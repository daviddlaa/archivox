<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestiones - Archivox</title>
<link rel="stylesheet" href="/desktop/css/base.css">
    <link rel="stylesheet" href="/css/drawer.css">
    <link rel="stylesheet" href="/css/notificaciones.css">
    <link rel="stylesheet" href="/css/modal.css">
    <link rel="stylesheet" href="/desktop/css/gestiones.css">
    <style>
        /* Estilos específicos para Gestiones */
        .gestion-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .gestion-badge.seguimiento { background: #dbeafe; color: #1e40af; }
        .gestion-badge.cobranza { background: #fee2e2; color: #991b1b; }
        .gestion-badge.llamada { background: #d1fae5; color: #065f46; }
        .gestion-badge.whatsapp { background: #dcfce7; color: #166534; }
        .gestion-badge.reclamo { background: #fef3c7; color: #92400e; }
        .gestion-badge.cita { background: #e0e7ff; color: #3730a3; }
        .gestion-badge.otro { background: #f3f4f6; color: #374151; }
        
        .gestion-fecha {
            font-size: 13px;
            color: #6b7280;
        }
        
        .gestion-observacion {
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: block;
        }
        
        .btn-accion {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            background: #f3f4f6;
            color: #374151;
            transition: all 0.2s;
        }
        .btn-accion:hover { background: #e5e7eb; }
        .btn-accion.primary { background: #2563eb; color: white; }
        .btn-accion.primary:hover { background: #1d4ed8; }
        .btn-accion.danger { background: #fee2e2; color: #991b1b; }
        .btn-accion.danger:hover { background: #fecaca; }
    </style>
</head>
<body>
<!-- Drawer Toggle -->
    <div id="drawer-wrapper"></div>

<div class="layout">
    <main class="contenido">
            <div class="container">
                <!-- Header Actions -->
                <div class="page-header">
                    <div class="page-header-left">
                        <h1>📝 Gestiones</h1>
                        <p class="subtitulo" id="titulo-campana-seleccionada">Todas las gestiones</p>
                    </div>
                    <div class="page-header-right">
                        <button class="notif-bell-usuario" onclick="abrirPanelNotificaciones()" title="Notificaciones">
                            🔔 <span id="notifBadgeUsuario" class="notif-badge-usuario" style="display:none">0</span>
                        </button>
                    </div>
                </div>
                
                <!-- Stats Grid -->
                <div class="stats-grid">
                    <div class="stat-card stat-total">
                        <div class="stat-icon">📊</div>
                        <div class="stat-content">
                            <h3>Total Gestiones</h3>
                            <span id="total-registros">0</span>
                        </div>
                    </div>
                    <div class="stat-card stat-verde">
                        <div class="stat-icon">👁️</div>
                        <div class="stat-content">
                            <h3>Mostrando</h3>
                            <span id="mostrando">0</span>
                        </div>
                    </div>
                    <div class="stat-card stat-azul">
                        <div class="stat-icon">📅</div>
                        <div class="stat-content">
                            <h3>Última Gestión</h3>
                            <span id="ultima-gestion">-</span>
                        </div>
                    </div>
                </div>
                
                <!-- Filtros Panel -->
                <div class="filtros-panel">
                    <div class="filtros-row">
                        <div class="filtro-group filtro-search-general">
                            <label>🔍 Buscar</label>
                            <input type="text" id="busqueda-general" placeholder="Buscar por cédula / nombre / teléfono / observación">
                        </div>
                        <div class="filtro-group">
                            <label>📋Tipo de Gestión</label>
                            <select id="tipo-gestion">
                                <option value="">Todos</option>
                                <option value="Seguimiento">Seguimiento</option>
                                <option value="Cobranza">Cobranza</option>
                                <option value="Llamada">Llamada</option>
                                <option value="WhatsApp">WhatsApp</option>
                                <option value="Reclamo">Reclamo</option>
                                <option value="Cita">Cita</option>
                                <option value="Otro">Otro</option>
                            </select>
                        </div>
                        <div class="filtro-actions">
                            <button class="btn btn-secondary" onclick="limpiarFiltros()">🧹 Limpiar</button>
                            <button class="btn btn-success" onclick="exportarExcel()">📥 Exportar</button>
                        </div>
                    </div>
                </div>
                
<!-- Tabla Container -->
                <div class="tabla-container">
                    <table class="tabla">
                        <thead>
                            <tr>
                                <th># Solicitud</th>
                                <th>Cédula</th>
                                <th>Nombre</th>
                                <th>Tipo Gestión</th>
                                <th>Observación</th>
                                <th>Fecha</th>
                                <th>Ver</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-gestiones">
                            <tr>
                                <td colspan="7" class="loading">Cargando gestiones...</td>
                            </tr>
                        </tbody>
                    </table>
                    <div id="infinite-scroll-sentinel"></div>
                </div>
                
                <!-- Mobile Cards - Gestiones -->
                <div class="gestiones-cards" id="cardsGestiones">
                    <div class="gestiones-empty">
                        <div class="gestiones-empty-icon">📭</div>
                        <p>Cargando...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Librería SheetJS para exportar Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <script src="/js/deep-link-router.js"></script>
    <script src="/js/notificaciones-dashboard.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/js/drawer.js"></script>
    <script src="/desktop/js/gestiones.js"></script>
</body>
</html>
