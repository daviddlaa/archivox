<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Archivox</title>
<link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <h1>📊 Archivox</h1>
            <p>Sistema de Gestión de Solicitudes</p>
        </div>

        <div id="mensaje"></div>

        <!-- Formulario de Login -->
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required placeholder="Ingresa tu usuario">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Ingresa tu contraseña">
            </div>
            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>

        <div class="toggle-form">
            <p>¿No tienes cuenta? <button type="button" onclick="mostrarRegistro()">Regístrate</button></p>
        </div>

        <!-- Formulario de Registro (oculto por defecto) -->
        <form id="registroForm" class="login-form" style="display: none;">
            <div class="form-group">
                <label for="regUsername">Usuario</label>
                <input type="text" id="regUsername" name="username" required placeholder="Elige un usuario">
            </div>
            <div class="form-group">
                <label for="regPassword">Contraseña</label>
                <input type="password" id="regPassword" name="password" required placeholder="Elige una contraseña">
            </div>
            <div class="form-group">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" name="email" placeholder="tu@correo.com">
            </div>
            <div class="form-group">
                <label for="regNombre">Nombre (opcional)</label>
                <input type="text" id="regNombre" name="nombre" placeholder="Tu nombre">
            </div>
            <button type="submit" class="btn-login">Crear Cuenta</button>
            <button type="button" class="btn-switch" onclick="mostrarLogin()">← Volver a iniciar sesión</button>
        </form>
    </div>

<script src="/js/login.js"></script>
</body>
</html>
