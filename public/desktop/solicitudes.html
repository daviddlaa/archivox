<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes - Archivox</title>
    <link rel="stylesheet" href="/desktop/css/base.css">
    <link rel="stylesheet" href="/css/drawer.css">
    <link rel="stylesheet" href="/desktop/css/solicitudes.css">
    <link rel="stylesheet" href="/css/solicitudes.css">
    <link rel="stylesheet" href="/css/modal.css">
    <link rel="stylesheet" href="/css/notificaciones.css">
</head>
<body>
    <div id="drawer-wrapper"></div>

    <div class="layout">
        <main class="contenido">
            <div class="container">
                <!-- Header -->
                <div class="page-header">
                    <div class="page-header-left">
                        <h1>📋 Solicitudes</h1>
                        <p class="subtitulo">Consulta y filtra los registros importados</p>
                    </div>
                    <div class="page-header-right">
                        <button class="notif-bell-usuario" onclick="abrirPanelNotificaciones()" title="Notificaciones">
                            🔔 <span id="notifBadgeUsuario" class="notif-badge-usuario" style="display:none">0</span>
                        </button>
                        <a href="/" class="btn-header btn-header-secondary">🏠 Dashboard</a>
                        <button class="btn-header btn-header-primary" onclick="abrirModalNuevaSolicitud()">➕ Nueva Solicitud</button>
                        <a href="/importar" class="btn-header btn-header-secondary">📤 Importar Excel</a>
                    </div>
                </div>
                
<!-- Stats compactos + Filtros -->
                <div class="stats-grid-unificado">
                    <div class="stat-card-compacto stat-total-unif">
                        <span class="stat-valor" id="totalRegistros">0</span>
                        <span class="stat-etiqueta">Total</span>
                    </div>
                    <div class="stat-card-compacto stat-showing-unif">
                        <span class="stat-valor" id="mostrando">0</span>
                        <span class="stat-etiqueta">Mostrando</span>
                    </div>
                    <div class="stat-card-compacto stat-selected-unif">
                        <span class="stat-valor" id="seleccionadas-count">0</span>
                        <span class="stat-etiqueta">Selecc</span>
                    </div>
                </div>

                <!-- Filtros unificados -->
                <div class="filtros-unificado">
                    <div class="filtros-row">
                        <div class="filtro-grupo">
                            <span class="filtro-label">📌 Estado</span>
                            <div class="filtro-botones" id="filtro-estado">
                                <button class="filtro-btn active" data-value="">Todos</button>
                            </div>
                        </div>
                        <div class="filtro-grupo">
                            <span class="filtro-label">🏷️ Segmento</span>
                            <div class="filtro-botones" id="filtro-segmento">
                                <button class="filtro-btn active" data-value="">Todos</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Buscador -->
                <div class="buscador-unificado">
                    <input type="text" id="cedula" placeholder="🔍 Buscar por id, cédula, nombre o teléfono...">
                </div>

                <!-- Barra de acciones -->
                <div class="acciones-unificado">
                    <div class="resumen-texto">
                        📊 Estado: <strong id="resumen-estado">Todos</strong> | 🏷️ Segmento: <strong id="resumen-segmento">Todos</strong>
                    </div>
                    <div class="acciones-botones">
                        <button class="accion-btn" onclick="exportarSeleccionadas()">📥 Exportar</button>
                        <button class="accion-btn" onclick="marcarSeleccionadas()">✓ Marcar</button>
                        <button class="accion-btn" onclick="limpiarFiltros()">🧹 Limpiar</button>
                        <button class="accion-btn peligro" onclick="borrarTodas()">🗑️ Borrar</button>
                    </div>
                </div>

                <!-- Selection Bar - Barra de selección profesional tipo Gmail/Drive -->
                <div id="selection-bar" class="selection-bar" style="display:none;">
                    <div class="selection-bar-inner">
                        <div class="selection-bar-left">
                            <button class="selection-bar-cancel" onclick="cancelarSeleccion()" title="Cancelar selección">
                                <span class="cancel-icon">✕</span>
                                <span class="cancel-text">Cancelar</span>
                            </button>
                            <div class="selection-bar-divider"></div>
                            <div class="selection-bar-count">
                                <span class="count-num" id="seleccionadas-count-toolbar">0</span>
                                <span class="count-label">seleccionadas</span>
                            </div>
                        </div>
                        <div class="selection-bar-right">
                            <button class="selection-bar-btn btn-campana" onclick="abrirModalNuevaGestion()" title="Crear campaña con las solicitudes seleccionadas">
                                <span class="btn-icon">🚀</span>
                                <span class="btn-text">Crear campaña</span>
                            </button>
                            <button class="selection-bar-btn btn-agregar" onclick="abrirModalAgregarCampana()" title="Agregar solicitudes a una campaña existente">
                                <span class="btn-icon">➕</span>
                                <span class="btn-text">Agregar a campaña</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Contenedor de Cards -->
                <div class="table-panel">
                    <!-- Contenedor de Cards unificado -->
                    <div id="cards-container" class="cards-grid-unificado"></div>
                </div>

                <!-- Floating Action Panel - Aparece al seleccionar + hacer scroll -->
                <div id="floating-actions-panel" class="floating-actions-panel" style="display:none;">
                    <div class="floating-actions-inner">
                        <div class="floating-actions-count">
                            <span class="floating-count-num" id="floating-count-num">0</span>
                            <span class="floating-count-label">seleccionadas</span>
                        </div>
                        <div class="floating-actions-divider"></div>
                        <button class="floating-action-btn btn-campana" onclick="abrirModalNuevaGestion()" title="Crear campaña con las solicitudes seleccionadas">
                            <span class="fab-icon">🚀</span>
                            <span class="fab-text">Crear campaña</span>
                        </button>
                        <button class="floating-action-btn btn-agregar" onclick="abrirModalAgregarCampana()" title="Agregar solicitudes a una campaña existente">
                            <span class="fab-icon">➕</span>
                            <span class="fab-text">Agregar</span>
                        </button>
                        <button class="floating-action-close" onclick="cancelarSeleccion()" title="Cancelar selección">
                            <span class="fab-icon">✕</span>
                        </button>
                    </div>
                </div>


            </div>
        </main>
    </div>

<!-- Librería SheetJS para exportar Excel -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

<script src="/js/deep-link-router.js"></script>
<script src="/js/notificaciones-dashboard.js"></script>
<script src="/js/modal.js"></script>
<script src="/js/drawer.js"></script>
<script src="/desktop/js/solicitudes.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
    });
</script>
</body>
</html>
