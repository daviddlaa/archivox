<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importar Excel - Archivox</title>
<link rel="stylesheet" href="/desktop/css/base.css">
    <link rel="stylesheet" href="/css/drawer.css">
    <link rel="stylesheet" href="/css/notificaciones.css">
    <link rel="stylesheet" href="/desktop/css/importar.css">
</head>
<body>
    <div id="drawer-wrapper"></div>

    <div class="layout">
        <main class="contenido">
            <div class="container">
                <div class="page-header">
                    <div class="page-header-left">
                        <h1>📤 Importar Excel</h1>
                        <p class="subtitulo">Sube tus archivos Excel (.xlsx, .xls) para importar solicitudes</p>
                    </div>
                    <div class="page-header-right">
                        <button class="notif-bell-usuario" onclick="abrirPanelNotificaciones()" title="Notificaciones">
                            🔔 <span id="notifBadgeUsuario" class="notif-badge-usuario" style="display:none">0</span>
                        </button>
                    </div>
                </div>
                
                <form id="formExcel">
                    <input type="file" id="excelFiles" name="excelFiles" multiple accept=".xlsx,.xls">
                    <button type="submit">📤 Subir Archivos</button>
                </form>

                <div id="mensaje"></div>
            </div>
        </main>
    </div>

<script src="/js/deep-link-router.js"></script>
<script src="/js/notificaciones-dashboard.js"></script>
    <script src="/js/drawer.js"></script>
    <script src="/desktop/js/importar.js"></script>

</body>
</html>
