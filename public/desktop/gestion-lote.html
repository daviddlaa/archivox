<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campañas - Archivox</title>
    <link rel="stylesheet" href="/desktop/css/base.css">
    <link rel="stylesheet" href="/css/drawer.css">
    <link rel="stylesheet" href="/css/notificaciones.css">
    <link rel="stylesheet" href="/css/modal.css">
    <link rel="stylesheet" href="/css/gestion-lote.css">
</head>
<body>
    <div id="drawer-wrapper"></div>

<div class="layout">
<!-- Sidebar de Campañas -->
        <aside id="sidebar-campañas" class="sidebar-campañas">
            <div class="sidebar-header">
                <h2>📋 Campañas</h2>
            </div>
            <div class="sidebar-content" id="lista-campañas">
                <div class="loading">Cargando campañas...</div>
            </div>
        </aside>
        
        <main class="contenido">
            <div class="container">
                <div class="page-header">
                    <div class="page-header-left">
                        <h1>🚀 Campañas</h1>
                        <p class="subtitulo" id="gestion-nombre">Selecciona una campaña del panel lateral</p>
                    </div>
                    <div class="page-header-right">
                        <button class="notif-bell-usuario" onclick="abrirPanelNotificaciones()" title="Notificaciones">
                            🔔 <span id="notifBadgeUsuario" class="notif-badge-usuario" style="display:none">0</span>
                        </button>
                        <button class="btn-header btn-header-success" id="btn-exportar-excel" onclick="exportarExcelGestionLote()" style="display:none">📥 Exportar Excel</button>
                        <a href="/solicitudes" class="btn-header btn-header-secondary">← Volver a Solicitudes</a>
                    </div>
                </div>
                
                <!-- Panel de Progreso -->
                <div class="progreso-panel" id="panel-progreso" style="display: none;">
                    <div class="progreso-info">
                        <div class="progreso-item">
                            <span class="progreso-label">Total Solicitudes</span>
                            <span class="progreso-value" id="total-solicitudes">0</span>
                        </div>
                        <div class="progreso-item">
                            <span class="progreso-label">Gestionadas</span>
                            <span class="progreso-value" id="gestionadas">0</span>
                        </div>
                        <div class="progreso-item">
                            <span class="progreso-label">Pendientes</span>
                            <span class="progreso-value" id="pendientes">0</span>
                        </div>
                        <div class="progreso-item">
                            <span class="progreso-label">Progreso</span>
                            <span class="progreso-value" id="progreso-porcentaje">0%</span>
                        </div>
                    </div>
                    <div class="progreso-barra">
                        <div class="barra-relleno" id="barra-progreso" style="width: 0%;"></div>
                    </div>
                </div>



                <!-- Botón Agregar Solicitudes -->
                <div id="agregar-solicitudes-container" style="display:none; margin-bottom:16px;">
                    <button class="btn-agregar-solicitudes" onclick="abrirModalAgregarSolicitudes()">➕ Agregar Solicitudes</button>
                </div>

                <!-- Filtros y Búsqueda -->
                <div class="filtros-row" id="filtros-row" style="display: none;">
                    <input type="text" id="busqueda" placeholder="🔍 Buscar por id, cédula, nombre o teléfono...">
                    <select id="filtro-estado">
                        <option value="">Todos los estados</option>
                        <option value="Pendiente">Pendiente</option>
                        <option value="Llamada">Llamada</option>
                        <option value="WhatsApp">WhatsApp</option>
                        <option value="Seguimiento">Seguimiento</option>
                        <option value="Cobranza">Cobranza</option>
                        <option value="Cita">Cita</option>
                        <option value="Completada">Completada</option>
                    </select>
                </div>

                <!-- Lista de Solicitudes -->
                <div class="lista-solicitudes" id="lista-solicitudes">
                    <div class="empty">
                        <p>Selecciona una campaña del panel lateral para ver las solicitudes.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- SheetJS para exportar Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="/js/deep-link-router.js"></script>
    <script src="/js/notificaciones-dashboard.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/js/drawer.js"></script>
    <script src="/desktop/js/gestion-lote.js"></script>

</body>
</html>
