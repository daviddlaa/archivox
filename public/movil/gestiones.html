<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestiones - Archivox</title>
    <link rel="stylesheet" href="/movil/css/estilos.css">
    <link rel="stylesheet" href="/movil/css/gestiones.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="header-title">
                <h1>📝 Gestiones</h1>
            </div>
        </div>
        
        <!-- Filtros -->
        <section class="filtros-section">
            <input type="text" id="busqueda-general" placeholder="🔍 Buscar por cédula / nombre / teléfono / observación" class="search-input">
            <select id="tipo-gestion" class="filter-select">
                <option value="">Todos los tipos</option>
                <option value="Seguimiento">Seguimiento</option>
                <option value="Cobranza">Cobranza</option>
                <option value="Llamada">Llamada</option>
                <option value="WhatsApp">WhatsApp</option>
                <option value="Reclamo">Reclamo</option>
                <option value="Cita">Cita</option>
                <option value="Otro">Otro</option>
            </select>
            <div class="filter-actions">
                <button class="btn btn-secondary" onclick="limpiarFiltros()">🧹</button>
            </div>
        </section>
        
        <!-- Stats -->
        <section class="stats-row">
            <div class="stat-item">
                <span class="stat-value" id="total-registros">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="mostrando">0</span>
                <span class="stat-label">Mostrando</span>
            </div>
        </section>
        
        <!-- Lista de Gestiones -->
        <section class="lista-section" id="lista-gestiones">
            <div class="loading">Cargando...</div>
        </section>
        
        <!-- Infinite Scroll -->
        <div id="infinite-scroll-sentinel"></div>
    </div>
    
    <nav class="nav-bottom">
        <a href="/m">
            <span class="nav-bottom-icon">📊</span>
            Inicio
        </a>
        <a href="/m/solicitudes">
            <span class="nav-bottom-icon">📋</span>
            Solicitudes
        </a>
        <a href="#" onclick="abrirDrawer(); return false;" class="active">
            <span class="nav-bottom-icon">☰</span>
            Menú
        </a>
    </nav>

    <script src="/movil/js/drawer.js"></script>
    <script src="/movil/js/gestiones.js"></script>
</body>
</html>
