<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestiones - Archivox</title>
    <link rel="stylesheet" href="/movil/css/estilos.css">
    <link rel="stylesheet" href="/movil/css/gestiones.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <button class="menu-btn" onclick="toggleDrawer()">☰</button>
            <h1>📝 Gestiones</h1>
            <button class="action-btn" onclick="abrirNuevaGestion()">➕</button>
        </header>
        
        <!-- Filtros -->
        <section class="filtros-section">
            <input type="text" id="cedula-buscar" placeholder="🔍 Buscar por cédula..." class="search-input">
            <select id="tipo-gestion" class="filter-select">
                <option value="">Todos los tipos</option>
                <option value="Seguimiento">Seguimiento</option>
                <option value="Cobranza">Cobranza</option>
                <option value="Llamada">Llamada</option>
                <option value="WhatsApp">WhatsApp</option>
                <option value="Reclamo">Reclamo</option>
                <option value="Cita">Cita</option>
                <option value="Otro">Otro</option>
            </select>
            <div class="filter-actions">
                <button class="btn btn-primary" onclick="buscarGestiones()">🔍 Buscar</button>
                <button class="btn btn-secondary" onclick="limpiarFiltros()">🧹</button>
            </div>
        </section>
        
        <!-- Stats -->
        <section class="stats-row">
            <div class="stat-item">
                <span class="stat-value" id="total-registros">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="mostrando">0</span>
                <span class="stat-label">Mostrando</span>
            </div>
        </section>
        
        <!-- Lista de Gestiones -->
        <section class="lista-section" id="lista-gestiones">
            <div class="loading">Cargando...</div>
        </section>
        
        <!-- Infinite Scroll -->
        <div id="infinite-scroll-sentinel"></div>
    </div>
    
    <!-- Drawer Menu -->
    <div class="drawer-overlay" id="drawer-overlay" onclick="toggleDrawer()"></div>
    <aside class="drawer" id="drawer">
        <div class="drawer-header">
            <h2>📊 Archivox</h2>
            <button class="drawer-close" onclick="toggleDrawer()">✕</button>
        </div>
        <nav class="drawer-nav">
            <a href="/movil/" class="drawer-link">📊 Dashboard</a>
            <a href="/movil/solicitudes" class="drawer-link">📋 Solicitudes</a>
            <a href="/movil/ventas" class="drawer-link">💰 Ventas</a>
            <a href="/movil/gestiones" class="drawer-link">📝 Gestiones</a>
            <a href="/movil/historial" class="drawer-link">🔄 Historial</a>
            <a href="/movil/importar" class="drawer-link">📤 Importar</a>
            <a href="#" class="drawer-link drawer-link-logout" onclick="cerrarSesion()">🚪 Cerrar Sesión</a>
        </nav>
    </aside>

    <script src="/movil/js/drawer.js"></script>
    <script src="/movil/js/gestiones.js"></script>
</body>
</html>
