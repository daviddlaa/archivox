<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión por Lotes - Archivox</title>
    <link rel="stylesheet" href="/movil/css/estilos.css">
    <link rel="stylesheet" href="/css/drawer.css">
    <link rel="stylesheet" href="/css/notificaciones.css">
    <link rel="stylesheet" href="/css/modal.css">
    <link rel="stylesheet" href="/movil/css/gestion-lote.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-title">
            <h1>🚀 Campañas</h1>
            <p id="gestion-titulo">Selecciona una campaña</p>
        </div>
    </div>

    <!-- Campañas Scroll -->
    <div class="campañas-scroll" id="lista-campañas">
        <div style="color: white; font-size: 12px; padding: 8px;">Cargando...</div>
    </div>

    <!-- Bottom Sheet de Acciones de Campaña -->
    <div id="campaña-bs-overlay" class="campaña-bs-overlay"></div>

<!-- Progreso Panel -->
    <div class="progreso-mobile" id="panel-progreso" style="display: none;">
        <div class="progreso-mobile-item">
            <div class="progreso-mobile-value" id="total-solicitudes">0</div>
            <div class="progreso-mobile-label">Total</div>
        </div>
        <div class="progreso-mobile-item">
            <div class="progreso-mobile-value" id="gestionadas">0</div>
            <div class="progreso-mobile-label">Gestionados</div>
        </div>
        <div class="progreso-mobile-item">
            <div class="progreso-mobile-value" id="pendientes">0</div>
            <div class="progreso-mobile-label">Pendientes</div>
        </div>
        <div class="progreso-mobile-item">
            <div class="progreso-mobile-value" id="progreso-porcentaje">0%</div>
            <div class="progreso-mobile-label">Progreso</div>
        </div>
    </div>
    <div class="progreso-mobile-barra" id="progreso-barra-container" style="display: none; background: white; padding: 0 15px 12px;">
        <div class="progreso-mobile-barra">
            <div class="progreso-mobile-relleno" id="barra-progreso" style="width: 0%;"></div>
        </div>
    </div>

<!-- Filtros -->
    <div class="filtros-mobile" id="filtros-row" style="display: none;">
        <input type="text" id="busqueda" placeholder="🔍 Buscar por id, cédula, nombre o teléfono...">
        <select id="filtro-estado">
            <option value="">Todos los estados</option>
            <option value="Pendiente">Pendiente</option>
            <option value="Llamada">Llamada</option>
            <option value="WhatsApp">WhatsApp</option>
            <option value="Seguimiento">Seguimiento</option>
            <option value="Cobranza">Cobranza</option>
            <option value="Cita">Cita</option>
            <option value="Completada">Completada</option>
        </select>
    </div>

    <!-- Botón Agregar Solicitudes (visible solo con campaña cargada) -->
    <div id="agregar-solicitudes-container" style="padding: 0 15px 10px; display: none;">
        <button class="btn-agregar-solicitudes" onclick="abrirModalAgregarSolicitudesMovil()">➕ Agregar Solicitudes</button>
    </div>

    <!-- Botón Exportar Excel (visible solo con campaña cargada) -->
    <div id="exportar-excel-container" style="padding: 0 15px 10px; display: none;">
        <button id="btn-exportar-excel-movil" class="btn-exportar-excel" onclick="exportarExcelGestionLote()">📥 Exportar Excel</button>
    </div>

    <!-- Lista de Solicitudes -->
    <div class="sol-list" id="lista-solicitudes">
        <div class="sin-campana">
            <div class="sin-campana-icon">📋</div>
            <p>Selecciona una campaña de arriba para ver las solicitudes.</p>
        </div>
    </div>

    <!-- Footer -->
    <nav class="nav-bottom">
        <a href="/m" class="nav-item active">
            <span class="nav-bottom-icon">📊</span>
            <span class="nav-bottom-label">Inicio</span>
        </a>
        <a href="/m/solicitudes" class="nav-item">
            <span class="nav-bottom-icon">📋</span>
            <span class="nav-bottom-label">Solicitudes</span>
        </a>
        <a href="#" onclick="Drawer.toggle(); return false;" class="nav-item">
            <span class="nav-bottom-icon">☰</span>
            <span class="nav-bottom-label">Menú</span>
        </a>
    </nav>

    <!-- SheetJS para exportar Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="/js/deep-link-router.js"></script>
    <script src="/js/notificaciones-dashboard.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/js/drawer.js"></script>
    <script src="/movil/js/gestion-lote.js"></script>
</body>
</html>
