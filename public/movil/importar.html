<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importar Excel - Archivox</title>
    <link rel="stylesheet" href="/movil/css/estilos.css">
    <link rel="stylesheet" href="/movil/css/importar.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-title">
            <h1>📤 Importar Excel</h1>
            <p>Sube archivos y procesa tus solicitudes desde móvil</p>
        </div>
        <button class="btn-menu" onclick="abrirDrawer()">☰</button>
    </div>

    <!-- Content -->
    <div class="importar-container">
        <div class="importar-card">
            <div class="card">
                <h2>Importar Excel</h2>
                <p>Asegúrate de seleccionar archivos `.xlsx` o `.xls` para cargar las solicitudes en el sistema.</p>

                <form id="formExcel">
                    <input type="file" id="excelFiles" name="excelFiles" multiple accept=".xlsx,.xls">
                    <button type="submit">📤 Subir Archivos</button>
                </form>

                <div id="mensaje"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <nav class="nav-bottom">
        <a href="/m" class="nav-item">
            <span class="nav-bottom-icon">📊</span>
            <span class="nav-bottom-label">Inicio</span>
        </a>
        <a href="/m/solicitudes" class="nav-item">
            <span class="nav-bottom-icon">📋</span>
            <span class="nav-bottom-label">Solicitudes</span>
        </a>
        <a href="#" class="nav-item active" onclick="abrirDrawer(); return false;">
            <span class="nav-bottom-icon">☰</span>
            <span class="nav-bottom-label">Menú</span>
        </a>
    </nav>

    <script src="/movil/js/drawer.js"></script>
    <script src="/movil/js/importar.js"></script>
</body>
</html>
