<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivox - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/movil/css/estilos.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-title">
            <h1>📊 Archivox</h1>
            <p>Dashboard</p>
        </div>
    </div>

    <!-- Contenido -->
    <section class="dashboard-hero">
        <div class="hero-copy">
            <h2>Resumen rápido</h2>
            <p>Consulta estados, solicitudes y segmentos en segundos.</p>
        </div>
    </section>

    <div class="cards-container">
        <div class="card card-total">
            <div class="card-icon">📄</div>
            <div class="card-info">
                <h3>Total</h3>
                <span id="totalSolicitudes">0</span>
            </div>
        </div>
        <div class="card card-verde">
            <div class="card-icon">✅</div>
            <div class="card-info">
                <h3>Activadas</h3>
                <span id="totalActivadas">0</span>
            </div>
        </div>
        <div class="card card-rojo">
            <div class="card-icon">❌</div>
            <div class="card-info">
                <h3>Rechazadas</h3>
                <span id="totalRechazadas">0</span>
            </div>
        </div>
        <div class="card card-amarillo">
            <div class="card-icon">⏳</div>
            <div class="card-info">
                <h3>Pendientes</h3>
                <span id="totalPendientes">0</span>
            </div>
        </div>
    </div>

    <div class="panel panel-chart">
        <div class="panel-title">
            <h3>📊 Estados</h3>
            <span>Resumen general</span>
        </div>
        <div class="chart-shell">
            <canvas id="chartEstados"></canvas>
        </div>
    </div>

    <div class="panel panel-chart">
        <div class="panel-title">
            <h3>🎯 Segmentos</h3>
            <span>Distribución</span>
        </div>
        <div class="chart-shell">
            <canvas id="chartSegmentos"></canvas>
        </div>
    </div>

    <nav class="nav-bottom">
        <a href="/m" class="active">
            <span class="nav-bottom-icon">📊</span>
            Inicio
        </a>
        <a href="/m/solicitudes">
            <span class="nav-bottom-icon">📋</span>
            Solicitudes
        </a>
        <a href="#" class="nav-bottom-more" onclick="abrirDrawer(); return false;">
            <span class="nav-bottom-icon">☰</span>
            Menú
        </a>
    </nav>

    <script src="/movil/js/drawer.js"></script>
    <script src="/movil/js/dashboard.js"></script>
</body>
</html>
