<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivox - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/movil/css/estilos.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-title">
            <h1>📊 Archivox</h1>
            <p>Dashboard</p>
        </div>
        <button class="btn-menu" onclick="abrirDrawer()">☰</button>
    </div>

    <!-- Contenido -->
    <div class="bienvenida">
        <h2>Bienvenido al sistema</h2>
        <p>Consulta el estado de tus solicitudes</p>
    </div>

    <div class="cards-container">
        <div class="card">
            <div class="card-icon" style="background: #e0e7ff;">📄</div>
            <div class="card-info">
                <h3>Total</h3>
                <span id="totalSolicitudes">0</span>
            </div>
        </div>
        <div class="card">
            <div class="card-icon" style="background: #d1fae5;">✅</div>
            <div class="card-info">
                <h3>Activadas</h3>
                <span id="totalActivadas">0</span>
            </div>
        </div>
        <div class="card">
            <div class="card-icon" style="background: #fee2e2;">❌</div>
            <div class="card-info">
                <h3>Rechazadas</h3>
                <span id="totalRechazadas">0</span>
            </div>
        </div>
        <div class="card">
            <div class="card-icon" style="background: #fef3c7;">⏳</div>
            <div class="card-info">
                <h3>Pendientes</h3>
                <span id="totalPendientes">0</span>
            </div>
        </div>
    </div>

    <div class="panel">
        <h3>📊 Estados</h3>
        <div style="position: relative; height: 220px;">
            <canvas id="chartEstados"></canvas>
        </div>
    </div>

    <div class="panel">
        <h3>🎯 Segmentos</h3>
        <div style="position: relative; height: 220px;">
            <canvas id="chartSegmentos"></canvas>
        </div>
    </div>

<!-- Footer -->
    <nav class="nav-bottom">
        <a href="/m" class="active">
            <span class="nav-bottom-icon">📊</span>
            Dashboard
        </a>
        <a href="/m/solicitudes">
            <span class="nav-bottom-icon">📋</span>
            Solicitudes
        </a>
        <a href="/m/importar">
            <span class="nav-bottom-icon">📤</span>
            Importar
        </a>
        <a href="/m/gestiones">
            <span class="nav-bottom-icon">⚙️</span>
            Gestiones
        </a>
        <a href="/m/equipo-ventas">
            <span class="nav-bottom-icon">💰</span>
            Ventas
        </a>
        <a href="/m/historial">
            <span class="nav-bottom-icon">🔄</span>
            Historial
        </a>
    </nav>

    <script src="/movil/js/drawer.js"></script>
    <script src="/movil/js/dashboard.js"></script>
</body>
</html>
