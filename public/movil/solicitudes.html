<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes - Archivox</title>
    <link rel="stylesheet" href="/movil/css/estilos.css">
    <link rel="stylesheet" href="/css/drawer.css">
    <link rel="stylesheet" href="/css/solicitudes.css">
    <link rel="stylesheet" href="/movil/css/solicitudes-mobile.css">
    <link rel="stylesheet" href="/css/notificaciones.css">
</head>
<body>
    <!-- Header -->
    <header class="header solicitudes-header">
        <div class="header-title-row">
            <h1>📋 Solicitudes</h1>
            <div class="header-actions-movil">
                <button class="notif-bell-usuario notif-bell-movil notif-bell-header" onclick="abrirPanelNotificaciones()" title="Notificaciones" aria-label="Notificaciones">
                    <span class="notif-bell-icon">🔔</span>
                    <span id="notifBadgeUsuario" class="notif-badge-usuario" style="display:none">0</span>
                </button>
                <button class="btn-nueva-solicitud-movil-header" onclick="abrirModalNuevaSolicitudMovil()" title="Nueva solicitud" aria-label="Nueva solicitud">
                    <span class="btn-icon">➕</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Stats -->
    <div class="stats-grid-unificado">
        <div class="stat-card-compacto stat-total-unif">
            <span class="stat-valor" id="totalRegistros">0</span>
            <span class="stat-etiqueta">Total</span>
        </div>
        <div class="stat-card-compacto stat-showing-unif">
            <span class="stat-valor" id="mostrando">0</span>
            <span class="stat-etiqueta">Mostrando</span>
        </div>
        <div class="stat-card-compacto stat-selected-unif">
            <span class="stat-valor" id="seleccionadas-count">0</span>
            <span class="stat-etiqueta">Selecc</span>
        </div>
    </div>

    <!-- Filtros unificados -->
    <div class="filtros-unificado">
        <div class="filtros-row">
            <div class="filtro-grupo">
                <span class="filtro-label">📌 Estado</span>
                <div class="filtro-botones" id="filtro-estado">
                    <button class="filtro-btn active" data-value="">Todos</button>
                </div>
            </div>
            <div class="filtro-grupo">
                <span class="filtro-label">🏷️ Segmento</span>
                <div class="filtro-botones" id="filtro-segmento">
                    <button class="filtro-btn active" data-value="">Todos</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Search -->
    <div class="buscador-unificado">
        <div class="buscador-search-row">
            <input type="text" id="cedula" placeholder="🔍 Buscar por id, cédula, nombre o teléfono...">
            <button type="button" class="filtro-btn active btn-select-all" id="btn-seleccionar-todo" onclick="toggleSeleccionarTodasVisibles()">
                Seleccionar todo
            </button>
        </div>
    </div>

    <!-- Bottom Action Bar - Barra inferior de selección tipo iOS/Android -->
    <div class="mobile-action-bar" id="mobile-action-bar" style="display:none;">
        <div class="action-bar-inner">
            <div class="action-bar-left">
                <button class="action-bar-cancel-btn" onclick="cancelarSeleccionMovil()" title="Cancelar selección">
                    <span class="cancel-icon">✕</span>
                </button>
                <div class="action-bar-count-wrap">
                    <span class="action-bar-count" id="action-bar-count">0</span>
                    <span class="action-bar-label">seleccionadas</span>
                </div>
            </div>
            <div class="action-bar-buttons">
                <button class="action-bar-btn btn-campana" onclick="abrirModalNuevaGestionMovil()" title="Crear campaña con las solicitudes seleccionadas">
                    <span class="btn-icon">🚀</span>
                    <span class="btn-text">Crear campaña</span>
                </button>
                <button class="action-bar-btn btn-agregar" onclick="abrirModalAgregarCampanaMovil()" title="Agregar solicitudes a una campaña existente">
                    <span class="btn-icon">➕</span>
                    <span class="btn-text">Agregar</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Cards List -->
    <div class="cards-grid-unificado solicitudes-cards-container" id="cards-container">
        <div class="estado-vacio">Cargando...</div>
    </div>



    <!-- Footer / Bottom Navigation -->
    <nav class="nav-bottom">
        <a href="/m" class="nav-item">
            <span class="nav-bottom-icon">📊</span>
            <span class="nav-bottom-label">Inicio</span>
        </a>
        <a href="/m/solicitudes" class="nav-item active">
            <span class="nav-bottom-icon">📋</span>
            <span class="nav-bottom-label">Solicitudes</span>
        </a>
        <a href="#" class="nav-item" onclick="Drawer.toggle(); return false;">
            <span class="nav-bottom-icon">☰</span>
            <span class="nav-bottom-label">Menú</span>
        </a>
    </nav>

<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="/js/notificaciones-dashboard.js"></script>
<script src="/js/drawer.js"></script>
<script src="/movil/js/solicitudes.js"></script>
</body>
</html>
