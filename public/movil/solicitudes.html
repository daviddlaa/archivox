<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes - Archivox</title>
    <link rel="stylesheet" href="/movil/css/estilos.css">
    <style>
        .stats { display: flex; gap: 10px; padding: 15px; background: white; }
        .stat { flex: 1; background: #f8fafc; padding: 12px; border-radius: 10px; text-align: center; }
        .stat span { display: block; font-size: 18px; font-weight: bold; color: #1f2937; }
        .stat small { font-size: 11px; color: #6b7280; }
        
        .filters { background: white; padding: 15px; margin-bottom: 10px; }
        .filtro-label { font-size: 12px; font-weight: 600; color: #374151; display: block; margin-bottom: 8px; }
        .btns { display: flex; gap: 6px; flex-wrap: wrap; }
        .btn { background: #f3f4f6; border: 1px solid #e5e7eb; color: #374151; padding: 6px 12px; border-radius: 15px; font-size: 11px; }
        .btn.active { background: #2563eb; border-color: #2563eb; color: white; }
        
        .search { padding: 0 15px; margin-bottom: 15px; }
        .search input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; }
        
        .cards-list { padding: 0 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        .client-card { background: white; border-radius: 12px; padding: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .client-id { font-size: 12px; font-weight: 600; color: #6b7280; }
        .badge { padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
        
        .client-name { font-size: 15px; font-weight: 600; color: #1f2937; margin-bottom: 3px; }
        .client-cedula { font-size: 12px; color: #6b7280; margin-bottom: 8px; }
        .tags { display: flex; gap: 5px; flex-wrap: wrap; }
        .tag { background: #f3f4f6; padding: 3px 8px; border-radius: 6px; font-size: 10px; color: #374151; }
        
        .no-data { text-align: center; padding: 30px; color: #6b7280; }
        
        .actions-floating { position: fixed; bottom: 80px; right: 15px; display: flex; gap: 10px; z-index: 999; }
        .btn-float { width: 56px; height: 56px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .btn-float:hover { transform: scale(1.1); }
        .btn-float.btn-whatsapp { background: #25d366; color: white; }
        .btn-float.btn-copy { background: #6366f1; color: white; }
        
        .client-card.seleccionada { border: 2px solid #2563eb; background: #eff6ff; }
        .card-checkbox { width: 20px; height: 20px; margin-right: 8px; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-title">
            <h1>📋 Solicitudes</h1>
        </div>
        <button class="btn-menu" onclick="abrirDrawer()">☰</button>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat"><span id="totalRegistros">0</span><small>Total</small></div>
        <div class="stat"><span id="mostrando">0</span><small>Mostrando</small></div>
        <div class="stat"><span id="seleccionadas-count">0</span><small>Seleccionadas</small></div>
</div>
    
    <!-- Actions Floating -->
    <div class="actions-floating" id="actions-floating" style="display:none;">
        <button class="btn-float btn-excel" id="btn-excel" onclick="exportarExcel()" title="Exportar Excel" style="background:#22c55e;">📊</button>
        <button class="btn-float btn-copy" id="btn-copy" onclick="copiarDatos()" title="Copiar">📋</button>
        <button class="btn-float btn-whatsapp" id="btn-whatsapp" onclick="enviarWhatsApp()" title="WhatsApp">📱</button>
    </div>

    <!-- Filters -->
    <div class="filters">
        <div style="margin-bottom:10px;">
            <span class="filtro-label">Estado</span>
            <div class="btns" id="filtro-estado"><button class="btn active" data-value="">Todos</button></div>
        </div>
        <div>
            <span class="filtro-label">Segmento</span>
            <div class="btns" id="filtro-segmento"><button class="btn active" data-value="">Todos</button></div>
        </div>
    </div>

    <!-- Search -->
    <div class="search">
        <input type="text" id="cedula" placeholder="🔍 Buscar por nombre, cédula o teléfono">
    </div>

    <!-- Cards List -->
    <div class="cards-list" id="cards-container">
        <div class="no-data">Cargando...</div>
    </div>

    <!-- Footer -->
    <nav class="nav-bottom">
        <a href="/m">
            <span class="nav-bottom-icon">📊</span>
            Dashboard
        </a>
        <a href="/m/solicitudes" class="active">
            <span class="nav-bottom-icon">📋</span>
            Solicitudes
        </a>
        <a href="/m/importar">
            <span class="nav-bottom-icon">📤</span>
            Importar
        </a>
        <a href="/m/equipo-ventas">
            <span class="nav-bottom-icon">💰</span>
            Ventas
        </a>
        <a href="/m/historial">
            <span class="nav-bottom-icon">🔄</span>
            Historial
        </a>
    </nav>

<!-- Librería SheetJS para exportar Excel -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

<script src="/movil/js/drawer.js"></script>
<script src="/movil/js/solicitudes.js"></script>
</body>
</html>
