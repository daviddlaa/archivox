<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes - Archivox</title>
    <link rel="stylesheet" href="/movil/css/estilos.css">
    <link rel="stylesheet" href="/css/solicitudes.css">
    <link rel="stylesheet" href="/movil/css/solicitudes-mobile.css">
    <link rel="stylesheet" href="/css/notificaciones.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-title" style="display:flex;align-items:center;justify-content:space-between;width:100%;">
            <h1>📋 Solicitudes</h1>
            <button class="notif-bell-usuario notif-bell-movil" onclick="abrirPanelNotificaciones()" title="Notificaciones">
                🔔 <span id="notifBadgeUsuario" class="notif-badge-usuario" style="display:none">0</span>
            </button>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid-unificado" style="padding: 12px 15px;">
        <div class="stat-card-compacto stat-total-unif">
            <span class="stat-valor" id="totalRegistros">0</span>
            <span class="stat-etiqueta">Total</span>
        </div>
        <div class="stat-card-compacto stat-showing-unif">
            <span class="stat-valor" id="mostrando">0</span>
            <span class="stat-etiqueta">Mostrando</span>
        </div>
        <div class="stat-card-compacto stat-selected-unif">
            <span class="stat-valor" id="seleccionadas-count">0</span>
            <span class="stat-etiqueta">Selecc</span>
        </div>
    </div>

    <!-- Filtros unificados -->
    <div class="filtros-unificado" style="margin: 0 15px 10px;">
        <div class="filtros-row">
            <div class="filtro-grupo" style="flex:1;">
                <span class="filtro-label">📌 Estado</span>
                <div class="filtro-botones" id="filtro-estado">
                    <button class="filtro-btn active" data-value="">Todos</button>
                </div>
            </div>
            <div class="filtro-grupo" style="flex:1;">
                <span class="filtro-label">🏷️ Segmento</span>
                <div class="filtro-botones" id="filtro-segmento">
                    <button class="filtro-btn active" data-value="">Todos</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Search -->
    <div class="buscador-unificado" style="padding: 0 15px;">
        <div style="display:flex;gap:8px;align-items:center;">
            <input type="text" id="cedula" placeholder="🔍 Buscar por id, cédula, nombre o teléfono..." style="flex:1;">
            <button type="button" class="filtro-btn active" id="btn-seleccionar-todo" onclick="toggleSeleccionarTodasVisibles()" style="white-space:nowrap;padding:12px 14px;">
                Seleccionar todo
            </button>
        </div>
    </div>

    <!-- Botones flotantes de campañas -->
    <div class="actions-floating" id="actions-floating" style="display:none;">
        <button class="btn-float" id="btn-gestion" onclick="abrirModalNuevaGestionMovil()" title="Crear campaña" style="background:#2563eb;">
            <span class="btn-float-icon">🚀</span>
            <span>Crear</span>
        </button>
        <button class="btn-float" id="btn-agregar-campana-movil" onclick="abrirModalAgregarCampanaMovil()" title="Agregar a campaña" style="background:#7c3aed;display:none;">
            <span class="btn-float-icon">➕</span>
            <span>Agregar</span>
        </button>
    </div>

    <!-- Cards List -->
    <div class="cards-grid-unificado" id="cards-container" style="padding: 10px 15px 80px;">
        <div class="estado-vacio">Cargando...</div>
    </div>

    <!-- Footer -->
    <nav class="nav-bottom">
        <a href="/m">
            <span class="nav-bottom-icon">📊</span>
            Inicio
        </a>
        <a href="/m/solicitudes" class="active">
            <span class="nav-bottom-icon">📋</span>
            Solicitudes
        </a>
        <a href="#" onclick="abrirDrawer(); return false;">
            <span class="nav-bottom-icon">☰</span>
            Menú
        </a>
    </nav>

<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="/js/notificaciones-dashboard.js"></script>
<script src="/movil/js/drawer.js"></script>
<script src="/movil/js/solicitudes.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof initNotificaciones === 'function') initNotificaciones();
    });
</script>
</body>
</html>
